upstream spring_backend {
    server server:8080;
}

upstream ml_service {
    server ml-service:8000;
}

upstream notification_service {
    server notification-service:5001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # ── React Frontend (static files) ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Spring Boot API ──
    location /api/ {
        proxy_pass http://spring_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Swagger UI ──
    location /swagger-ui/ {
        proxy_pass http://spring_backend;
        proxy_set_header Host $host;
    }

    location /api-docs {
        proxy_pass http://spring_backend;
        proxy_set_header Host $host;
    }

    # ── Python ML Service (direct access if needed) ──
    location /ml/ {
        rewrite ^/ml/(.*) /$1 break;
        proxy_pass http://ml_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Socket.IO (WebSocket upgrade) ──
    location /socket.io/ {
        proxy_pass http://notification_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Notification REST API ──
    location /notifications/ {
        rewrite ^/notifications/(.*) /api/notifications/$1 break;
        proxy_pass http://notification_service;
        proxy_set_header Host $host;
    }

    # ── Internal events (service-to-service, not public) ──
    location /internal/ {
        proxy_pass http://notification_service;
        proxy_set_header Host $host;
    }

    # ── Health checks ──
    location /health/server {
        proxy_pass http://spring_backend/api/health;
    }

    location /health/ml {
        proxy_pass http://ml_service/health;
    }

    location /health/notifications {
        proxy_pass http://notification_service/health;
    }
}
