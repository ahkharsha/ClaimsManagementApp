version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: insuranceiq-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: insuranceiq_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: insuranceiq-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/insuranceiq_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: insuranceiq-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
