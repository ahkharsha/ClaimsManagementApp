apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: insuranceiq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification
          image: ${ECR_REGISTRY}/insuranceiq-notification:latest
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: DB_HOST
              value: "mysql"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "insuranceiq_notifications"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: insuranceiq-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: insuranceiq-secrets
                  key: jwt-secret
            - name: SPRING_BOOT_URL
              value: "http://server-svc:8080"
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "250m"
              memory: "250Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: notification-svc
  namespace: insuranceiq
spec:
  type: ClusterIP
  selector:
    app: notification
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
