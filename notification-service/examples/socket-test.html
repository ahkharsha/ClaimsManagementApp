<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsuranceIQ — Socket.IO Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 30px;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h3 {
            color: #6366f1;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status.connected { background: #065f46; color: #6ee7b7; }
        .status.disconnected { background: #7f1d1d; color: #fca5a5; }
        input, button {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 14px;
            width: 100%;
            margin-bottom: 10px;
        }
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button.danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .notification-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .notification-item .title {
            color: #6366f1;
            font-weight: 600;
            font-size: 14px;
        }
        .notification-item .message {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 4px;
        }
        .notification-item .meta {
            color: #475569;
            font-size: 11px;
            margin-top: 6px;
        }
        .badge {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 700;
            margin-left: 8px;
        }
        #log {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #6ee7b7;
        }
        #log div { margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ InsuranceIQ</h1>
        <p class="subtitle">Socket.IO Notification Test Client</p>

        <!-- Connection Card -->
        <div class="card">
            <h3>🔌 Connection</h3>
            <p style="margin-bottom:10px;">
                Status: <span id="status" class="status disconnected">Disconnected</span>
            </p>
            <input type="text" id="tokenInput" placeholder="Paste JWT token here..." />
            <button onclick="connectSocket()">Connect</button>
            <button class="danger" onclick="disconnectSocket()">Disconnect</button>
        </div>

        <!-- Notifications Card -->
        <div class="card">
            <h3>🔔 Live Notifications <span id="badge" class="badge" style="display:none;">0</span></h3>
            <div id="notifications">
                <p style="color:#475569; font-size:13px;">No notifications yet. Connect and trigger events to see them here.</p>
            </div>
        </div>

        <!-- Console Log -->
        <div class="card">
            <h3>📋 Console Log</h3>
            <div id="log"></div>
        </div>
    </div>

    <!-- Socket.IO Client CDN -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        let socket = null;
        let notificationCount = 0;

        function log(msg) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.prepend(entry);
        }

        function connectSocket() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                log('❌ Please enter a JWT token');
                return;
            }

            if (socket && socket.connected) {
                log('⚠️ Already connected');
                return;
            }

            socket = io('http://localhost:5001', {
                auth: { token }
            });

            socket.on('connect', () => {
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'status connected';
                log('🟢 Connected to InsuranceIQ Notification Service');
            });

            socket.on('disconnect', (reason) => {
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').className = 'status disconnected';
                log(`🔴 Disconnected: ${reason}`);
            });

            socket.on('connect_error', (err) => {
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').className = 'status disconnected';
                log(`❌ Connection error: ${err.message}`);
            });

            // Listen for notifications
            socket.on('notification', (data) => {
                log(`📨 Notification received: ${data.eventType} — ${data.title}`);
                addNotification(data);
            });
        }

        function disconnectSocket() {
            if (socket) {
                socket.disconnect();
                socket = null;
                log('🔴 Manually disconnected');
            }
        }

        function addNotification(data) {
            const container = document.getElementById('notifications');

            // Remove placeholder text
            if (notificationCount === 0) {
                container.innerHTML = '';
            }

            notificationCount++;

            // Update badge
            const badge = document.getElementById('badge');
            badge.style.display = 'inline';
            badge.textContent = notificationCount;

            // Create notification element
            const item = document.createElement('div');
            item.className = 'notification-item';
            item.innerHTML = `
                <div class="title">${data.title || 'Notification'}</div>
                <div class="message">${data.message || ''}</div>
                <div class="meta">${data.eventType || 'UNKNOWN'} • ${data.timestamp || new Date().toISOString()}</div>
            `;
            container.prepend(item);
        }
    </script>
</body>
</html>
