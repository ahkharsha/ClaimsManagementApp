# ===== Server =====
server.port=8080

# ===== MySQL =====
# Env vars: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/insuranceiq_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== Jackson =====
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== JWT =====
app.jwt.secret=${APP_JWT_SECRET:InsuranceIQSecretKey2024VeryLongSecretKeyForHS256AlgorithmMinimum256Bits}
app.jwt.expiration-ms=86400000

# ===== File Upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ===== External Services =====
app.fraud-service.url=${APP_FRAUD_SERVICE_URL:http://localhost:8000}
app.notification-service.url=${APP_NOTIFICATION_SERVICE_URL:http://localhost:5001}
app.service-secret=${APP_SERVICE_SECRET:InsuranceIQInternalServiceSecret2024}

# ===== CORS =====
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:80}

# ===== Swagger / OpenAPI =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operations-sorter=method
