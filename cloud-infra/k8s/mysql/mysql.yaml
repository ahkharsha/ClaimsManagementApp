apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: insuranceiq
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS insuranceiq_db;
    CREATE DATABASE IF NOT EXISTS insuranceiq_notifications;
    GRANT ALL PRIVILEGES ON insuranceiq_db.* TO 'root'@'%';
    GRANT ALL PRIVILEGES ON insuranceiq_notifications.* TO 'root'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: insuranceiq
spec:
  clusterIP: None
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: insuranceiq
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: insuranceiq-secrets
                  key: db-password
            - name: MYSQL_DATABASE
              value: insuranceiq_db
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h localhost -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: mysql-init-scripts
          configMap:
            name: mysql-init
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "gp2"
        resources:
          requests:
            storage: 5Gi
